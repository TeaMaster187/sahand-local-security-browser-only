<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sahandlocal</title>
    <script>
      // Fix for environments where window.fetch is read-only (getter only)
      // This prevents some libraries from crashing when they try to polyfill/override fetch
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            // Check if it's configurable or already has a setter
            const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
            if (descriptor && (descriptor.writable || descriptor.set || descriptor.configurable)) {
              Object.defineProperty(window, 'fetch', {
                get: function() { return originalFetch; },
                set: function(val) { 
                  console.warn('System: Attempted to override window.fetch - override ignored to prevent crash.');
                },
                configurable: true,
                enumerable: true
              });
            }
          }
        } catch (e) {
          console.warn('Fetch resilience protocol warning:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
